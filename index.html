<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #E2E8CE;
            --surface: #ACBFA4;
            --text-primary: #262626;
            --text-secondary: #4a4a4a;
            --accent: #FF7F11;
            --black: #000000;
            --color-new: #576A8F;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Mono', 'Roboto Mono', monospace;
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            font-size: 17px;
            line-height: 1.5;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--bg);
            border-bottom: 1px solid var(--black);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .logo {
            font-size: 29px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--accent);
        }

        .logo-tagline {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
            margin-left: 8px;
        }

        .lang-toggle {
            display: flex;
            gap: 0;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--black);
            color: var(--color-new);
            padding: 6px 14px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            transition: all 150ms ease;
        }

        .lang-btn:first-child {
            border-radius: 0;
        }

        .lang-btn:last-child {
            border-left: none;
        }

        .lang-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--color-new);
        }

        .lang-btn:hover:not(.active) {
            background: var(--surface);
        }

        .main {
            padding-top: 60px;
            padding-bottom: 220px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .featured-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .featured-label::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
        }

        .episode-card.featured {
            border: 2px solid var(--accent);
            margin-bottom: 32px;
        }

        .episode-card {
            background: var(--surface);
            border: 1px solid var(--black);
            padding: 16px;
            margin-bottom: 16px;
        }

        .episode-header {
            display: flex;
            gap: 16px;
        }

        .ascii-container {
            flex-shrink: 0;
            width: 100px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ascii-logo {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 29px;
            font-weight: 700;
            line-height: 1.2;
            white-space: pre;
            background: linear-gradient(45deg, #FF7F11, #ACBFA4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .featured .ascii-container {
            width: 140px;
        }

        .featured .ascii-logo {
            font-size: 38px;
        }

        .episode-info {
            flex: 1;
            min-width: 0;
        }

        .episode-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            word-wrap: break-word;
        }

        .episode-meta {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .duration {
            color: var(--color-new);
        }

        .lang-badge {
            display: inline-block;
            padding: 2px 6px;
            border: 1px solid var(--black);
            font-size: 12px;
            text-transform: uppercase;
        }

        .lang-badge.de {
            border-color: var(--color-new);
            color: var(--color-new);
        }

        .lang-badge.en {
            border-color: var(--color-new);
            color: var(--color-new);
        }

        .source-link {
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 12px;
        }

        .source-link:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border: 1px solid var(--black);
            font-size: 14px;
            cursor: pointer;
            transition: all 150ms ease;
            background: transparent;
            font-family: inherit;
        }

        .tag:hover {
            background: var(--bg);
        }

        .tag.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        .intro-short {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .intro-toggle {
            background: transparent;
            border: none;
            color: var(--color-new);
            padding: 4px 0;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: all 150ms ease;
        }

        .intro-toggle:hover {
            text-decoration: underline;
        }

        .intro-long {
            display: none;
            padding: 12px;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-secondary);
            border-left: 2px solid var(--accent);
            margin-top: 8px;
        }

        .intro-long.show {
            display: block;
        }

        .audio-player {
            position: fixed;
            bottom: 50px;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--black);
            padding: 12px 20px;
            z-index: 90;
            transform: translateY(100%);
            transition: transform 200ms ease;
        }

        .audio-player.show {
            transform: translateY(0);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .player-title {
            flex: 1;
            font-size: 17px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 16px;
            justify-content: center;
        }

        .control-btn {
            background: transparent;
            border: 1px solid var(--black);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: inherit;
            font-size: 17px;
            transition: all 150ms ease;
        }

        .control-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        .control-btn.play-pause {
            width: 48px;
            height: 48px;
            font-size: 22px;
        }

        .speed-btn {
            width: auto;
            padding: 0 12px;
            font-size: 14px;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .time-display {
            font-size: 11px;
            color: var(--color-new);
            min-width: 80px;
            text-align: center;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--bg);
            cursor: pointer;
            position: relative;
            border: 1px solid var(--black);
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 100ms linear;
        }

        .filter-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg);
            border-top: 1px solid var(--black);
            padding: 10px 20px;
            z-index: 100;
            overflow-x: auto;
        }

        .filter-section {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: nowrap;
        }

        .filter-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .filter-pills {
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
        }

        .filter-pill {
            padding: 4px 12px;
            border: 1px solid var(--black);
            background: transparent;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 150ms ease;
        }

        .filter-pill:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-pill.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        .clear-filters {
            margin-left: auto;
            background: transparent;
            border: 1px solid var(--black);
            color: var(--text-secondary);
            padding: 4px 10px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 150ms ease;
        }

        .clear-filters:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        @media (max-width: 640px) {
            .header {
                padding: 0 12px;
            }

            .logo {
                font-size: 18px;
            }

            .container {
                padding: 12px;
            }

            .episode-header {
                flex-direction: column;
            }

            .ascii-container {
                width: 100%;
                max-width: 200px;
                margin-bottom: 12px;
            }

            .episode-title {
                font-size: 16px;
            }

            .player-controls {
                gap: 8px;
            }

            .control-btn {
                width: 36px;
                height: 36px;
            }

            .control-btn.play-pause {
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>
