<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParrotLoop - Podcast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #E2E8CE;
            --surface: #ACBFA4;
            --text-primary: #262626;
            --text-secondary: #4a4a4a;
            --accent: #FF7F11;
            --black: #000000;
            --color-new: #576A8F;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Mono', 'Roboto Mono', monospace;
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            font-size: 17px;
            line-height: 1.5;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--bg);
            border-bottom: 1px solid var(--black);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .logo {
            font-size: 29px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--accent);
        }

        .logo-tagline {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
            margin-left: 8px;
        }

        .lang-toggle {
            display: flex;
            gap: 0;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--black);
            color: var(--color-new);
            padding: 6px 14px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            transition: all 150ms ease;
        }

        .lang-btn:first-child {
            border-radius: 0;
        }

        .lang-btn:last-child {
            border-left: none;
        }

        .lang-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--color-new);
        }

        .lang-btn:hover:not(.active) {
            background: var(--surface);
        }

        .main {
            padding-top: 60px;
            padding-bottom: 220px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .featured-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .featured-label::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
        }

        .episode-card.featured {
            border: 2px solid var(--accent);
            margin-bottom: 32px;
        }

        .episode-card {
            background: var(--surface);
            border: 1px solid var(--black);
            padding: 16px;
            margin-bottom: 16px;
        }

        .episode-header {
            display: flex;
            gap: 16px;
        }

        .ascii-container {
            flex-shrink: 0;
            width: 100px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .featured .ascii-container {
            width: 140px;
        }

        .featured .ascii-logo {
            font-size: 38px;
        }

        .episode-info {
            flex: 1;
            min-width: 0;
        }

        .episode-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            word-wrap: break-word;
        }

        .episode-meta {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .duration {
            color: var(--text-secondary);
        }

        .lang-badge {
            display: inline-block;
            padding: 2px 6px;
            border: 1px solid var(--black);
            font-size: 12px;
            text-transform: uppercase;
        }

        .lang-badge.de {
            border-color: var(--color-new);
            color: var(--color-new);
        }

        .lang-badge.en {
            border-color: var(--color-new);
            color: var(--color-new);
        }

        .source-link {
            font-size: 14px;
            color: var(--color-new);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 12px;
        }

        .source-link:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border: 1px solid var(--black);
            font-size: 14px;
            cursor: pointer;
            transition: all 150ms ease;
            background: transparent;
            font-family: inherit;
        }

        .tag:hover {
            background: var(--bg);
        }

        .tag.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        .intro-short {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .intro-toggle {
            background: transparent;
            border: none;
            color: var(--color-new);
            padding: 4px 0;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: all 150ms ease;
        }

        .intro-toggle:hover {
            text-decoration: underline;
        }

        .intro-long {
            display: none;
            padding: 12px;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-secondary);
            border-left: 2px solid var(--accent);
            margin-top: 8px;
        }

        .intro-long.show {
            display: block;
        }

        .audio-player {
            position: fixed;
            bottom: 50px;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--black);
            padding: 12px 20px;
            z-index: 90;
            transform: translateY(100%);
            transition: transform 200ms ease;
        }

        .audio-player.show {
            transform: translateY(0);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .player-title {
            flex: 1;
            font-size: 17px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 16px;
            justify-content: center;
        }

        .control-btn {
            background: transparent;
            border: 1px solid var(--black);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: inherit;
            font-size: 17px;
            transition: all 150ms ease;
        }

        .control-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        .control-btn.play-pause {
            width: 48px;
            height: 48px;
            font-size: 22px;
        }

        .speed-btn {
            width: auto;
            padding: 0 12px;
            font-size: 14px;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .time-display {
            font-size: 11px;
            color: var(--color-new);
            min-width: 80px;
            text-align: center;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--bg);
            cursor: pointer;
            position: relative;
            border: 1px solid var(--black);
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 100ms linear;
        }

        .filter-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg);
            border-top: 1px solid var(--black);
            padding: 10px 20px;
            z-index: 100;
            overflow-x: auto;
        }

        .filter-section {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: nowrap;
        }

        .filter-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .filter-pills {
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
        }

        .filter-pill {
            padding: 4px 12px;
            border: 1px solid var(--black);
            background: transparent;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 150ms ease;
        }

        .filter-pill:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-pill.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        .clear-filters {
            margin-left: auto;
            background: transparent;
            border: 1px solid var(--black);
            color: var(--text-secondary);
            padding: 4px 10px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 150ms ease;
        }

        .clear-filters:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        @media (max-width: 640px) {
            .header {
                padding: 0 12px;
            }

            .logo {
                font-size: 18px;
            }

            .container {
                padding: 12px;
            }

            .episode-header {
                flex-direction: column;
            }

            .ascii-container {
                width: 100%;
                max-width: 200px;
                margin-bottom: 12px;
            }

            .episode-title {
                font-size: 16px;
            }

            .player-controls {
                gap: 8px;
            }

            .control-btn {
                width: 36px;
                height: 36px;
            }

            .control-btn.play-pause {
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>

    <script>
        const taglines = [
            "Humanity, automated for your convenience.",
            "A podcast where the machine laughs last — and longest",
            "Because consciousness was clearly a beta feature.",

            "Tech talks to itself. You just happen to be listening.",
            "A glitch, a thought, and a nervous laugh.",
            "Bringing humanity to machines — and regret to humans.",

        ];

        const longIntros = {
            1: "In diesem Text beschreibt Michael Goldstein das Bitcoin-Ökosystem als ein Umfeld des permanenten wirtschaftlichen Konflikts, in dem verschiedene Akteure versuchen, anderen ihre digitalen Anteile abspenstig zu machen. Der Autor nutzt den Begriff „Scammer“ als provokante Heuristik, um zu verdeutlichen, dass sowohl Händler als auch Investoren und Sparer oft eigennützige Strategien verfolgen, die zulasten Unvorsichtiger gehen. Während Verkäufer zum Ausgeben animieren und Investitionsprojekte mit zweifelhaften Renditeversprechen locken, setzen überzeugte „Hamster“ auf das langfristige Halten, um vom exponentiellen Wertzuwachs der Hyperbitcoinisierung zu profitieren. Goldstein argumentiert, dass der Schutz des eigenen Vermögens in diesem digitalen Krieg allein von der persönlichen Willenskraft und dem Verzicht auf unnötige Transaktionen abhängt. Wahre Sicherheit entsteht demnach nicht durch Vertrauen in Dritte, sondern durch das Verständnis der begrenzten Verfügbarkeit und der zukünftigen Kaufkraft von Bitcoin. Letztlich wird das Horten als die einzige siegreiche Strategie dargestellt, um in einer kommenden Post-Fiat-Welt finanziell zu bestehen.",
            2: "In this text, Michael Goldstein argues that within the Bitcoin ecosystem, almost every participant can be considered a ‘scammer’ because there is constant competition for ownership of the scarce digital coins. Traders, investors and even hoarders alike try to persuade others to give up their holdings in exchange for consumer goods or risky promises. The author warns that the true value of Bitcoin lies in its future purchasing power, which is why spending or investing it often constitutes a strategic mistake. Since conventional theft is made difficult by encryption, actors use psychological manipulation and market mechanisms to gain access to the assets of others. Ultimately, hoarding (HODL) is described as the only sensible defence strategy in an environment characterised by self-interest and the pursuit of global dominance. According to Goldstein, those who recklessly give away their bitcoins will lose their place in a coming economic order.",
            3: "In diesem Gespräch erörtert Alex Gladstein von der Human Rights Foundation, wie Bitcoin als Werkzeug für Freiheit und gegen autoritäre Unterdrückung dienen kann. Er unterscheidet zwischen negativen Rechten, wie der Meinungsfreiheit, und staatlichen Ansprüchen, die oft zur Manipulation der Bürger genutzt werden. Gladstein argumentiert, dass die Dezentralisierung von Geld durch Bitcoin es Einzelpersonen ermöglicht, sich der staatlichen Überwachung und Inflation zu entziehen. Das Konzept des Trojanischen Pferdes beschreibt dabei, wie die Gier nach Profit autoritäre Regime dazu verleitet, eine Technologie zu adoptieren, die letztlich ihre eigene Macht untergräbt. Trotz der Risiken durch Big-Data-Analysen und KI bleibt Gladstein optimistisch, dass Verschlüsselung die Souveränität des Einzelnen weltweit stärken wird. Das Interview betont abschließend, dass technologische Innovationen und finanzielle Autonomie essenziell sind, um globale Menschenrechtsverletzungen friedlich zu bekämpfen.",
            4: "In this conversation, Alex Gladstein of the Human Rights Foundation discusses how Bitcoin can serve as a tool for freedom and against authoritarian oppression. He distinguishes between negative rights, such as freedom of expression, and state claims, which are often used to manipulate citizens. Gladstein argues that the decentralisation of money through Bitcoin allows individuals to escape state surveillance and inflation. The concept of the Trojan horse describes how the greed for profit tempts authoritarian regimes to adopt a technology that ultimately undermines their own power. Despite the risks posed by big data analytics and AI, Gladstein remains optimistic that encryption will strengthen individual sovereignty worldwide. The interview concludes by emphasising that technological innovation and financial autonomy are essential for peacefully combating global human rights violations.",
            5: "In diesem Interview mit Lex Fridman reflektiert Dan Houser, Mitbegründer von Rockstar Games, über seine Karriere und die kreativen Prozesse hinter Welterfolgen wie Grand Theft Auto und Red Dead Redemption. Houser erläutert, wie Einflüsse aus Literatur und Film seine Vision von Open-World-Spielen prägten, in denen er eine Balance zwischen spielerischer Freiheit und tiefgründiger Erzählkunst anstrebte. Das Gespräch thematisiert zudem die Bedeutung von Vielschichtigkeit in Charakteren wie Arthur Morgan sowie die technischen Hürden bei der Erschaffung lebendiger digitaler Welten. Abseits seiner vergangenen Erfolge gibt er Einblicke in sein neues Studio Absurd Ventures und diskutiert die potenziellen Auswirkungen von KI auf das Storytelling. Abschließend teilt Houser persönliche Gedanken über Moral, den menschlichen Makel und die fundamentale Rolle von Geschichten bei der Suche nach Sinn.",
            6: "In this interview with Lex Fridman, Dan Houser, co-founder of Rockstar Games, reflects on his career and the creative processes behind global successes such as Grand Theft Auto and Red Dead Redemption. Houser explains how influences from literature and film shaped his vision of open-world games, in which he sought to strike a balance between playful freedom and profound storytelling. The conversation also touches on the importance of complexity in characters such as Arthur Morgan, as well as the technical hurdles involved in creating vibrant digital worlds. Moving beyond his past successes, he offers insights into his new studio, Absurd Ventures, and discusses the potential impact of AI on storytelling. Finally, Houser shares personal thoughts on morality, human flaws, and the fundamental role of stories in the search for meaning.",
            7: "Dario Amodei analysiert in diesem Text die zivilisatorischen Herausforderungen, die mit der Entstehung einer extrem leistungsfähigen künstlichen Intelligenz verbunden sind. Er vergleicht den aktuellen technologischen Fortschritt mit einer kritischen Adoleszenz, in der die Menschheit lernen muss, mit nahezu unvorstellbarer Macht verantwortungsvoll umzugehen. Der Autor identifiziert dabei fünf zentrale Risikofelder, die von einem potenziellen Autonomieverlust der Systeme über biologische Gefahren bis hin zu politischem Missbrauch durch Autokratien reichen. Zudem beleuchtet er die ökonomischen Umwälzungen, insbesondere die drohende Verdrängung menschlicher Arbeitskraft und eine gefährliche Konzentration von Wohlstand. Amodei plädiert für gezielte Sicherheitsmassnahmen, wie etwa technische Leitplanken und staatliche Transparenzregeln, um die Risiken zu minimieren. Letztlich beschreibt er die kommenden Jahre als Reifeprüfung für die Spezies, deren Ausgang darüber entscheidet, ob die KI zum Segen oder zum Untergang der Zivilisation führt.",
            8: "In this text, Dario Amodei analyses the civilisational challenges associated with the emergence of extremely powerful artificial intelligence. He compares current technological progress to a critical adolescence in which humanity must learn to handle almost unimaginable power responsibly. The author identifies five key areas of risk, ranging from a potential loss of autonomy of the systems to biological dangers and political abuse by autocracies. He also highlights the economic upheavals, in particular the threat of human labour being displaced and a dangerous concentration of wealth. Amodei advocates targeted security measures, such as technical guidelines and government transparency rules, to minimise the risks. Ultimately, he describes the coming years as a test of maturity for the species, the outcome of which will determine whether AI leads to the blessing or the downfall of civilisation."
        };

        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');
        const speedBtn = document.getElementById('speed-btn');

        function init() {
            // Set random tagline
            const taglineEl = document.getElementById('tagline');
            const randomTagline = taglines[Math.floor(Math.random() * taglines.length)];
            taglineEl.textContent = randomTagline;

            renderLanguageButtons();
            renderEpisodes();
            setupEventListeners();
        }

        function renderLanguageButtons() {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === currentLanguage);
            });
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ':' + secs.toString().padStart(2, '0');
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function renderEpisodes() {
            const langFiltered = currentLanguage === 'all'
                ? episodes
                : episodes.filter(ep => ep.language === currentLanguage);

            filteredEpisodes = currentTag === 'all'
                ? langFiltered
                : langFiltered.filter(ep => ep.tags.includes(currentTag));

            filteredEpisodes.sort((a, b) => {
                if (a.featured && !b.featured) return -1;
                if (!a.featured && b.featured) return 1;
                return b.id - a.id;
            });

            if (filteredEpisodes.length === 0) {
                episodesContainer.innerHTML = '<div class="empty-state"><h3>No episodes found</h3><p>Try adjusting your filters or language selection</p></div>';
                return;
            }

            let html = '';

            filteredEpisodes.forEach((ep, index) => {
                if (ep.featured) {
                    html += '<div class="featured-label">Featured Episode</div>';
                }

                html += '<div class="episode-card ' + (ep.featured ? 'featured' : '') + '" data-id="' + ep.id + '">';
                html += '<div class="episode-header">';
                html += '<div class="ascii-container"></div>';
                html += '<div class="episode-info">';
                html += '<div class="episode-title">' + ep.title + '</div>';
                html += '<div class="episode-meta">';
                html += '<span class="date">' + formatDate('2026-02-' + (24 - index)) + '</span>';
                html += '<span class="duration">—' + ep.duration + ' min</span>';
                html += '</div>';
                html += '<a href="' + ep.source + '" target="_blank" class="source-link">Source: ' + new URL(ep.source).hostname + '</a>';
                html += '<div class="tags">';
                ep.tags.forEach(tag => {
                    html += '<button class="tag ' + (currentTag === tag ? 'active' : '') + '" data-tag="' + tag + '">#' + tag.charAt(0).toUpperCase() + tag.slice(1) + '</button>';
                });
                html += '</div>';
                html += '<div class="intro-short">' + shortIntros[ep.id] + '</div>';
                html += '<button class="intro-toggle" data-episode="' + ep.id + '">[+] Show Full Intro</button>';
                html += '<div class="intro-long" id="intro-' + ep.id + '">' + longIntros[ep.id] + '</div>';
                html += '</div></div></div>';
            });

            episodesContainer.innerHTML = html;
        }

        function playEpisode(episodeId) {
            const episode = episodes.find(ep => ep.id === episodeId);
            if (!episode) return;

            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            currentAudio = new Audio(episode.audioUrl);
            currentAudio.playbackRate = playbackRate;

            playerTitle.textContent = episode.title;
            audioPlayer.classList.add('show');

            currentAudio.play().then(() => {
                isPlaying = true;
                playPauseBtn.textContent = '❚❚';
            }).catch(err => {
                console.log('Audio playback failed:', err);
            });

            currentAudio.addEventListener('timeupdate', updateProgress);
            currentAudio.addEventListener('loadedmetadata', () => {
                timeTotal.textContent = formatTime(currentAudio.duration);
            });
            currentAudio.addEventListener('ended', () => {
                isPlaying = false;
                playPauseBtn.textContent = '▶';
            });
        }

        function updateProgress() {
            if (!currentAudio) return;
            const percent = (currentAudio.currentTime / currentAudio.duration) * 100;
            progressFill.style.width = percent + '%';
            timeCurrent.textContent = formatTime(currentAudio.currentTime);
        }

        function togglePlay() {
            if (!currentAudio) return;

            if (isPlaying) {
                currentAudio.pause();
                playPauseBtn.textContent = '▶';
            } else {
                currentAudio.play();
                playPauseBtn.textContent = '❚❚';
            }
            isPlaying = !isPlaying;
        }

        function seek(seconds) {
            if (!currentAudio) return;
            currentAudio.currentTime = Math.max(0, Math.min(currentAudio.currentTime + seconds, currentAudio.duration));
        }

        function setProgress(e) {
            if (!currentAudio) return;
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            currentAudio.currentTime = percent * currentAudio.duration;
        }

        function cycleSpeed() {
            const speeds = [1, 1.25, 1.5, 2];
            const currentIndex = speeds.indexOf(playbackRate);
            playbackRate = speeds[(currentIndex + 1) % speeds.length];
            speedBtn.textContent = playbackRate + 'x';
            if (currentAudio) {
                currentAudio.playbackRate = playbackRate;
            }
        }

        function setupEventListeners() {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentLanguage = btn.dataset.lang;
                    localStorage.setItem('parrotloop-lang', currentLanguage);
                    renderLanguageButtons();
                    renderEpisodes();
                });
            });

            document.querySelectorAll('.filter-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    currentTag = pill.dataset.tag;
                    document.querySelectorAll('.filter-pill').forEach(p => {
                        p.classList.toggle('active', p.dataset.tag === currentTag);
                    });
                    renderEpisodes();
                });
            });

            document.getElementById('clear-filters').addEventListener('click', () => {
                currentTag = 'all';
                currentLanguage = 'en';
                document.querySelectorAll('.filter-pill').forEach(p => {
                    p.classList.toggle('active', p.dataset.tag === 'all');
                });
                renderLanguageButtons();
                renderEpisodes();
            });

            episodesContainer.addEventListener('click', (e) => {
                const tagBtn = e.target.closest('.tag');
                if (tagBtn) {
                    currentTag = tagBtn.dataset.tag;
                    document.querySelectorAll('.filter-pill').forEach(p => {
                        p.classList.toggle('active', p.dataset.tag === currentTag);
                    });
                    renderEpisodes();
                    return;
                }

                const introToggle = e.target.closest('.intro-toggle');
                if (introToggle) {
                    const episodeId = introToggle.dataset.episode;
                    const introContent = document.getElementById('intro-' + episodeId);
                    introContent.classList.toggle('show');
                    introToggle.textContent = introContent.classList.contains('show')
                        ? '[-] Hide Full Intro'
                        : '[+] Show Full Intro';
                    return;
                }

                const card = e.target.closest('.episode-card');
                if (card && !e.target.closest('.tag') && !e.target.closest('.intro-toggle') && !e.target.closest('.source-link')) {
                    playEpisode(parseInt(card.dataset.id));
                }
            });

            playPauseBtn.addEventListener('click', togglePlay);
            document.getElementById('rewind-btn').addEventListener('click', () => seek(-15));
            document.getElementById('forward-btn').addEventListener('click', () => seek(15));
            speedBtn.addEventListener('click', cycleSpeed);
            progressBar.addEventListener('click', setProgress);
        }

        init();
    </script>


</body>
</html>
